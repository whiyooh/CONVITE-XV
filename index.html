<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 anos da Maria Eduarda</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>
  <main class="app">

    <!-- TELA 1: convite fechado / aparência impressa -->
    <section class="screen screen-cover active" id="screen-cover">
      <div class="printed-envelope">
        <div class="envelope-panel left"></div>
        <div class="envelope-panel right"></div>

        <button class="wax-seal" type="button" onclick="openPrintedEnvelope()" aria-label="Abrir convite">
          <img src="imgs/iconss.png" centered alt="Selo de cera decorativo"
          width="70"
          height="50"
          />
        </button>
      </div>
    </section>

    <!-- NOVA TELA 2: pré-convite -->
   <section class="screen screen-pre-invite" id="screen-pre-invite">
  <div class="pre-invite-text">
    <img class="text-img text-img-1" src="copy/vc foi.png" alt="Você foi convidado" />
    <img class="text-img text-img-2" src="copy/uma noite.png" alt="Uma noite elegante e inesquecível" />
  </div>

  <button
    class="pre-invite-click-area"
    type="button"
    onclick="startOpeningVideo()"
    aria-label="Ver convite">
  </button>
</section>

    <!-- TELA 3: vídeo de abertura de 8 segundos -->
    <section class="screen screen-video" id="screen-video">
      <video
        id="opening-video"
        class="opening-video"
        src="imgs/video.mp4"
        playsinline
        preload="auto"
      ></video>

      <div class="video-overlay">
        <p class="eyebrow">Abrindo convite</p>
        <h2>Maria Eduarda</h2>
        <div class="progress">
          <span id="progress-bar"></span>
        </div>
      </div>

      <button class="skip-button" type="button" onclick="finishOpeningVideo()">
        Pular abertura
      </button>
    </section>

    <!-- TELA 4: convite completo / informações -->
<section class="screen screen-invite" id="screen-invite">
  <div class="background-ornaments"></div>

  <article class="invite-card">
    <img
      class="invite-image"
      src="imgs/icon.png"
      width="210"
      height="180"
      alt="Logo 15 anos Maria Eduarda"
    />

    <div class="invite-title-block">
      <span>15 anos</span>
      <h1>Maria Eduarda</h1>
    </div>

    <p class="intro-text">
      Celebre comigo meus 15 anos em uma noite elegante e inesquecível.
    </p>

    <div class="event-info">
      <div class="event-date">
        <span>Data</span>
        <strong>19 de Junho</strong>
      </div>

      <p><strong>Horário:</strong> 20:00</p>

      <p><strong>Local da festa:</strong></p>
      <p>Buffet Uriel - Estr. dos Pinheiros, 70 - Parque Viana - Barueri</p>
    </div>

    <nav class="action-grid" aria-label="Opções do convite">
     <button class="action-card" type="button" onclick="openModal('manual')">
  <img src="icons/manual (2).png" alt="" />
  <span>Manual do convidado</span>
</button>

      <button class="action-card" type="button" onclick="openModal('gifts')">
        <img src="icons/icon presente.png" alt="" />
        <span>Sugestões de presente</span>
      </button>

      <button class="action-card" type="button" onclick="openModal('location')">
        <img src="icons/icon local.png" alt="" />
        <span>Localização da festa</span>
      </button>

      <button class="action-card" type="button" onclick="openModal('rsvp')">
        <img src="icons/icon confirma.png" alt="" />
        <span>Confirmar presença</span>
      </button>
    </nav>
  </article>
</section>

    <div class="modal-layer" id="modal-layer" aria-hidden="true">
      <div class="modal-backdrop" onclick="closeModal()"></div>

      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" type="button" onclick="closeModal()" aria-label="Fechar">×</button>
        <div id="modal-content"></div>
      </section>
    </div>
  </main>

</body>
</html>
